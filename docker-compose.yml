services:
  strava-mcp:
    build: .
    container_name: strava-mcp
    restart: unless-stopped
    command: ["mcp-proxy", "--port", "8080", "--apiKey", "${MCP_API_KEY}", "--", "strava-mcp-server"]
    environment:
      - MCP_API_KEY
      - STRAVA_CLIENT_ID
      - STRAVA_CLIENT_SECRET
      - STRAVA_ACCESS_TOKEN
      - STRAVA_REFRESH_TOKEN
    ports:
      - "${STRAVA_MCP_PORT:-18201}:8080"
    volumes:
      - strava-config:/root/.config/strava-mcp
    networks:
      - strava-net

volumes:
  strava-config:

networks:
  strava-net:
